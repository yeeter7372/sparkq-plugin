name: Build SparkQ JAR
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - run: mvn compile
      - run: cd target/classes && jar xf ../../sparkq_modified.jar me/z3dyy/endervault/EnderVaultCommand.class me/z3dyy/endervault/UtilityCommand.class me/z3dyy/endervault/PlayerUtilCommand.class me/z3dyy/endervault/RecipeCommand.class me/z3dyy/endervault/SparkQCommand.class
      - run: mvn jar:jar
      - uses: actions/upload-artifact@v4
        with:
          name: SparkQ-hateffects
          path: target/EnderVault-1.0.0.jar
          retention-days: 30
