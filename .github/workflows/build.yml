name: Build SparkQ JAR
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Extract original classes for compilation classpath
        run: |
          mkdir -p original-classes
          cd original-classes && jar xf ../sparkq_modified.jar && cd ..
      - name: Compile new source files
        run: mvn compile -Dcompile.additional.classpath=original-classes
      - name: Merge original class files
        run: |
          cd target/classes
          jar xf ../../sparkq_modified.jar \
            me/z3dyy/endervault/EnderVaultCommand.class \
            me/z3dyy/endervault/UtilityCommand.class \
            me/z3dyy/endervault/PlayerUtilCommand.class \
            me/z3dyy/endervault/RecipeCommand.class \
            me/z3dyy/endervault/SparkQCommand.class
          cd ../..
      - name: Package JAR
        run: mvn jar:jar
      - uses: actions/upload-artifact@v4
        with:
          name: SparkQ-hateffects
          path: target/EnderVault-1.0.0.jar
          retention-days: 30
